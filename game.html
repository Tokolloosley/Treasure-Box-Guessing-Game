<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Treasure Box Guessing Game</title>
    <link rel="stylesheet" href="Style/styles.css" />
  </head>
  <body>
    <main class="game-window-wrap">
      <section class="card">
        <h1>Treasure Box Guessing Game</h1>

        <div class="button-row">
          <button id="startBtn" type="button">Start Game</button>
          <button id="hintBtn" type="button">Reveal Safe Hint</button>
          <button id="saveBtn" type="button">Save Session</button>
          <button id="loadBtn" type="button">Load Session</button>
          <button id="resetBtn" type="button">Reset Game</button>
          <button id="backBtn" type="button">Back to Settings</button>
        </div>

        <div class="stats-grid game-stats-grid">
          <div class="stat-box">
            <span class="label">Player</span>
            <span id="displayPlayer">-</span>
          </div>
          <div class="stat-box">
            <span class="label">Score</span>
            <span id="displayScore">0</span>
          </div>
          <div class="stat-box">
            <span class="label">Lives</span>
            <span id="displayLives">0</span>
          </div>
          <div class="stat-box">
            <span class="label">Opened</span>
            <span id="displayOpened">0</span>
          </div>
          <div class="stat-box">
            <span class="label">Rewards</span>
            <span id="displayRewards">0</span>
          </div>
          <div class="stat-box">
            <span class="label">Best Score</span>
            <span id="displayBestScore">0</span>
          </div>
        </div>
      </section>

      <section class="card">
        <div id="ruleArea" class="rule-area">Open boxes and avoid traps.</div>
        <div id="messageArea" class="message-area">
          Click Start Game when ready.
        </div>
      </section>

      <section class="card">
        <div id="boardInfo" class="board-info">
          <span
            ><strong>Grid:</strong> <span id="displayGridSize">-</span></span
          >
          <span
            ><strong>Difficulty:</strong>
            <span id="displayDifficulty">-</span></span
          >
          <span><strong>Theme:</strong> <span id="displayTheme">-</span></span>
          <span
            ><strong>Safe Boxes Left:</strong>
            <span id="displaySafeLeft">-</span></span
          >
          <span
            ><strong>Shield:</strong> <span id="displayShield">-</span></span
          >
        </div>

        <div id="boxGrid" class="box-grid"></div>
      </section>

      <section class="card">
        <h2>Round Results</h2>
        <div id="resultsArea" class="results-area">No results yet.</div>
      </section>

      <section class="card">
        <h2>Game Log</h2>
        <div id="logArea" class="log-area"></div>
      </section>
    </main>
     <script src="script.js"></script>
  </body>
</html>
